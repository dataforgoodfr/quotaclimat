name: RRS Migrations

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'rrs/**'
      - '.github/workflows/rrs.yaml'
  push:
    branches: [main]
    paths:
      - 'rrs/**'
      - '.github/workflows/rrs.yaml'

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || 'test' }}
    env:
      REGISTRY_ENV: ${{ github.event_name == 'push' && 'prod' || 'dev' }}
      IMAGE_TAG: ${{ github.event_name == 'push' && 'prod' || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          username: nologin
          password: ${{ secrets.RRS_SCW_SECRET_KEY }}
          registry: rg.fr-par.scw.cloud/rrs-${{ env.REGISTRY_ENV }}

      - name: Build RRS image
        run: docker build -f rrs/Dockerfile . -t rg.fr-par.scw.cloud/rrs-${{ env.REGISTRY_ENV }}/rrs-base:${{ env.IMAGE_TAG }}

      - name: Push RRS image
        run: docker push rg.fr-par.scw.cloud/rrs-${{ env.REGISTRY_ENV }}/rrs-base:${{ env.IMAGE_TAG }}

  migrate-and-seed:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || 'test' }}
    env:
      JOB_NAME: rrs-migrate-${{ github.event_name == 'push' && 'prod' || 'dev' }}
    steps:
      - name: Setup Scaleway CLI
        uses: scaleway/action-scw@v0
        with:
          save-config: true
          export-config: true
          access-key: ${{ secrets.RRS_SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.RRS_SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.RRS_SCW_PROJECT_ID }}

      - name: Trigger and wait for migrate-and-seed job
        run: |
          JOB_ID=$(scw jobs definition list -o json | jq -r --arg name "$JOB_NAME" '.[] | select(.name == $name) | .id')
          echo "Starting job: $JOB_NAME ($JOB_ID)"

          RUN_ID=$(scw jobs run create job-definition-id="$JOB_ID" -o json | jq -r '.id')
          echo "Job run ID: $RUN_ID"

          while true; do
            STATUS=$(scw jobs run get "$RUN_ID" -o json | jq -r '.state')
            echo "Status: $STATUS"
            case "$STATUS" in
              succeeded) echo "Job succeeded"; exit 0 ;;
              failed|canceled|error) echo "Job failed with status: $STATUS"; exit 1 ;;
            esac
            sleep 15
          done
