name: RRS Migrations

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'rrs/**'
      - '.github/workflows/rrs.yaml'
  push:
    branches: [main]
    paths:
      - 'rrs/**'
      - '.github/workflows/rrs.yaml'

env:
  RRS_PG_HOST: ${{ secrets.RRS_PG_HOST }}
  RRS_PG_PORT: ${{ secrets.RRS_PG_PORT }}
  RRS_PG_DATABASE: ${{ secrets.RRS_PG_DATABASE }}
  RRS_PG_USER: ${{ secrets.RRS_PG_USER }}
  RRS_PG_PASSWORD: ${{ secrets.RRS_PG_PASSWORD }}

jobs:
  migrate-and-seed:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || 'test' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python & Poetry
        uses: ./.github/actions/setup
        with:
          python-version: '3.12'
          poetry-version: '2.1.3'

      - name: Install dependencies
        run: poetry install --no-interaction --only main

      - name: Run RRS Alembic migrations
        run: poetry run alembic -c rrs/alembic.ini upgrade head

      - name: Upsert subjects
        run: poetry run python -m rrs.dictionary.upsert_subjects

      - name: Upsert dictionary
        run: poetry run python -m rrs.dictionary.upsert_dictionary

  build-and-push:
    needs: migrate-and-seed
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || 'test' }}
    env:
      REGISTRY_ENV: ${{ github.event_name == 'push' && 'prod' || 'dev' }}
      IMAGE_TAG: ${{ github.event_name == 'push' && 'prod' || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}
          registry: rg.fr-par.scw.cloud/rrs-${{ env.REGISTRY_ENV }}

      - name: Build RRS image
        run: docker build -f rrs/Dockerfile . -t rg.fr-par.scw.cloud/rrs-${{ env.REGISTRY_ENV }}/rrs-base:${{ env.IMAGE_TAG }}

      - name: Push RRS image
        run: docker push rg.fr-par.scw.cloud/rrs-${{ env.REGISTRY_ENV }}/rrs-base:${{ env.IMAGE_TAG }}
