name: tests

on:
  push:
    paths-ignore:
      - 'rrs/**'
      - 'infrastructure/**'
      - '.github/workflows/rrs.yaml'

env:
  PYTHON_VERSION: '3.12'
  POETRY_VERSION: '2.1.3'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - name: poetry install
        run: poetry install --no-interaction

  test_first_update_keywords:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: user
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - name: pytest run test_first_update_keywords
        run: |
          set -o pipefail
          source .venv/bin/activate
          poetry run pytest -vv -k 'test_update_pg_keywords' test/
        env:
          ENV: dev
          POSTGRES_USER: user
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

  stop_word:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: user
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - name: pytest run stop_word
        run: |
          set -o pipefail
          source .venv/bin/activate
          poetry run pytest -vv -k 'stop_word' test/
        env:
          ENV: dev
          POSTGRES_USER: user
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

  test_print_media_keywords:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - name: pytest run print_media keyword detection tests
        run: |
          set -o pipefail
          source .venv/bin/activate
          poetry run pytest -vv test/print_media/test_print_media_detect_keywords.py
        env:
          ENV: dev

  dbt:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: user
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - name: pytest dbt
        run: |
          set -o pipefail
          source .venv/bin/activate
          poetry run dbt debug
          poetry run pytest --log-level DEBUG -vv my_dbt_project/pytest_tests
        env:
          ENV: dev
          POSTGRES_USER: user
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          DBT_PROJECT_DIR: my_dbt_project
          DBT_PROFILES_DIR: my_dbt_project/dbt

  test_everything_else:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: user
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - name: docker compose up nginx
        run: docker compose up -d nginxtest
      - name: pytest run everything else
        run: |
          set -o pipefail
          source .venv/bin/activate
          poetry run pytest -vv -k 'not test_update_pg_keywords and not stop_word' \
           --ignore=test/print_media/test_print_media_detect_keywords.py \
           test/ --junitxml=pytest.xml \
           --cov-report=term-missing:skip-covered \
           --cov=quotaclimat --cov=postgres test/ | \
           tee pytest-coverage.txt
        env:
          ENV: dev
          POSTGRES_USER: user
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          retention-days: 1
          name: code-coverage-report
          path: | # from pytest run everything else job
            pytest.xml
            pytest-coverage.txt
          overwrite:  true

  verify_poetry_lock:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - name: Verify poetry.lock agrees with pyproject.toml
        run: poetry check --lock

  coverage_and_reporting:
    needs: [test_first_update_keywords, test_everything_else, stop_word, test_print_media_keywords, verify_poetry_lock]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - name: Download a single artifact
        uses: actions/download-artifact@v4
        with:
          name: code-coverage-report
      - name: Pytest coverage comment
        if: github.actor != 'dependabot[bot]'
        id: coverageComment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: pytest-coverage.txt
          junitxml-path: ./pytest.xml
      - name: Check the output coverage
        if: github.actor != 'dependabot[bot]'
        run: |
          echo "Coverage Percentage - ${{ steps.coverageComment.outputs.coverage }}"
      - name: Create Awesome Badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 579237daab71afbb359338e2706b7f36
          filename: test.json
          label: Coverage
          message: "${{ steps.coverageComment.outputs.tests }} tests - ${{ steps.coverageComment.outputs.coverage }}"
          color: ${{ steps.coverageComment.outputs.color }}
          namedLogo: python

  build_and_push_docker_image:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          username: nologin
          password: ${{ secrets.SCALEWAY_API_KEY }}
          registry: ${{ secrets.DEV_CONTAINER_REGISTRY_ENDPOINT }}

      # Sanitize branch name: lowercase, replace / and _ with -
      # feat/my_feature → feat-my-feature
      - name: Compute tag
        id: tag
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          SANITIZED=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g')
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "sanitized=${SANITIZED}" >> $GITHUB_OUTPUT
          echo "value=${SANITIZED}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build quotaclimat_base image
        run: docker build -f Dockerfile . -t ${{ secrets.DEV_CONTAINER_REGISTRY_ENDPOINT }}/quotaclimat_base:${{ steps.tag.outputs.value }}

      - name: Tag quotaclimat_base sanitized image
        run: docker tag ${{ secrets.DEV_CONTAINER_REGISTRY_ENDPOINT }}/quotaclimat_base:${{ steps.tag.outputs.value }} ${{ secrets.DEV_CONTAINER_REGISTRY_ENDPOINT }}/quotaclimat_base:${{ steps.tag.outputs.sanitized }}

      - name: Push quotaclimat_base Image
        run: docker push --all-tags ${{ secrets.DEV_CONTAINER_REGISTRY_ENDPOINT }}/quotaclimat_base

      - name: Print image ref
        run: |
          echo "### 🐳 Docker image pushed" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ secrets.DEV_CONTAINER_REGISTRY_ENDPOINT }}/quotaclimat_base:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ secrets.DEV_CONTAINER_REGISTRY_ENDPOINT }}/quotaclimat_base:${{ steps.tag.outputs.sanitized }}\`" >> $GITHUB_STEP_SUMMARY
