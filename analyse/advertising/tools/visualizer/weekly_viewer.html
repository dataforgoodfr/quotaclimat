<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuotaClimat — Weekly Segment Viewer</title>
<style>
:root {
  --bg: #0c0c18;
  --surface: #161628;
  --surface2: #1e1e36;
  --surface3: #28284a;
  --border: #2a2a4a;
  --primary: #00d2a0;
  --primary-dim: #00805f;
  --accent: #f0c040;
  --accent-dim: #a08020;
  --danger: #e05050;
  --text: #e0e4ea;
  --text2: #9098aa;
  --text3: #606878;
  --group-highlight: rgba(0, 210, 160, 0.25);
  --radius: 6px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ─── Header ─────────────────────────────────────── */
#header {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}
#logo {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
#logo .q { color: var(--primary); }
#logo .c { color: var(--accent); }
#header-stats {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text2);
}
#header-stats .stat-val { color: var(--primary); font-weight: 700; font-size: 14px; }
#params-toggle {
  margin-left: auto;
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 4px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
}
#params-toggle:hover { color: var(--text); border-color: var(--primary-dim); }

/* ─── Params Panel ───────────────────────────────── */
#params-panel {
  display: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  font-size: 12px;
  color: var(--text2);
  flex-shrink: 0;
  max-height: 200px;
  overflow-y: auto;
}
#params-panel.open { display: block; }
#params-panel table { border-collapse: collapse; }
#params-panel td { padding: 2px 12px 2px 0; }
#params-panel td:first-child { color: var(--text3); font-family: var(--mono); }

/* ─── Day Navigation ─────────────────────────────── */
#day-nav {
  display: flex;
  gap: 4px;
  padding: 8px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  align-items: center;
  flex-wrap: wrap;
}
.day-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 4px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.15s;
}
.day-btn:hover { border-color: var(--primary-dim); color: var(--text); }
.day-btn.active { background: var(--primary-dim); border-color: var(--primary); color: #fff; }
#nav-controls {
  margin-left: auto;
  display: flex;
  gap: 6px;
  align-items: center;
}
.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 28px;
  height: 28px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:hover { border-color: var(--primary-dim); color: var(--text); }
#zoom-label { font-size: 11px; color: var(--text3); min-width: 60px; text-align: center; }

/* ─── Canvas Area ────────────────────────────────── */
#canvas-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
}
.canvas-row {
  position: relative;
  flex-shrink: 0;
}
.canvas-row canvas {
  display: block;
  width: 100%;
}
.canvas-label {
  position: absolute;
  left: 8px;
  top: 4px;
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  pointer-events: none;
  z-index: 2;
}
#overview-row { height: 40px; border-bottom: 1px solid var(--border); }
#density-row { height: 80px; border-bottom: 1px solid var(--border); }
#timeline-row {
  flex: 1;
  min-height: 120px;
  cursor: grab;
}
#timeline-row.grabbing { cursor: grabbing; }

/* ─── Tooltip ────────────────────────────────────── */
#tooltip {
  display: none;
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text);
  z-index: 100;
  pointer-events: none;
  max-width: 320px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  line-height: 1.5;
}
#tooltip .tt-label { color: var(--primary); font-weight: 700; margin-bottom: 2px; }
#tooltip .tt-group { color: var(--accent); }

/* ─── Detail Panel ───────────────────────────────── */
#detail-panel {
  position: fixed;
  right: 0;
  top: 0;
  width: 460px;
  height: 100%;
  background: var(--surface);
  border-left: 2px solid var(--primary-dim);
  transform: translateX(100%);
  transition: transform 0.25s ease;
  z-index: 200;
  display: flex;
  flex-direction: column;
  box-shadow: -4px 0 30px rgba(0,0,0,0.5);
}
#detail-panel.open { transform: translateX(0); }
#detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#detail-header h3 { font-size: 14px; color: var(--primary); }
#close-detail {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 22px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
}
#close-detail:hover { color: var(--danger); }
#media-container {
  flex-shrink: 0;
  background: #000;
  position: relative;
}
#media-container video, #media-container audio {
  width: 100%;
  display: block;
  max-height: 260px;
}
#detail-content {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
}
.detail-section {
  margin-bottom: 16px;
}
.detail-section h4 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text3);
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
  font-size: 12px;
}
.info-grid .label { color: var(--text3); }
.info-grid .value { color: var(--text); font-family: var(--mono); font-size: 11px; }
.group-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
}
.member-list {
  list-style: none;
  max-height: 300px;
  overflow-y: auto;
}
.member-item {
  padding: 6px 8px;
  margin: 2px 0;
  border-radius: var(--radius);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.1s;
}
.member-item:hover { background: var(--surface3); }
.member-item.current { background: var(--group-highlight); border-left: 3px solid var(--primary); }
.member-item .m-time { color: var(--primary); font-family: var(--mono); font-size: 11px; }
.member-item .m-dur { color: var(--text3); font-size: 10px; }

/* ─── Keyboard Help ──────────────────────────────── */
#kbd-help {
  position: fixed;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--text3);
  display: flex;
  gap: 12px;
  z-index: 50;
  pointer-events: none;
}
kbd {
  background: var(--surface3);
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
}

/* ─── Scrollbar ──────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }
</style>
</head>
<body>

<div id="header">
  <div id="logo"><span class="q">Quota</span><span class="c">Climat</span></div>
  <div id="header-stats">
    <div><span class="stat-val" id="stat-segments">0</span> segments</div>
    <div><span class="stat-val" id="stat-grouped">0</span> groupés</div>
    <div><span class="stat-val" id="stat-groups">0</span> groupes</div>
    <div><span class="stat-val" id="stat-parts">0</span> parties</div>
    <div><span class="stat-val" id="stat-annotations">0</span> annotations</div>
  </div>
  <button id="params-toggle">Paramètres</button>
</div>

<div id="params-panel"></div>

<nav id="day-nav">
  <div id="day-buttons"></div>
  <div id="nav-controls">
    <button class="nav-btn" id="zoom-out" title="Dézoomer (-)">-</button>
    <span id="zoom-label">1 jour</span>
    <button class="nav-btn" id="zoom-in" title="Zoomer (+)">+</button>
    <button class="nav-btn" id="pan-left" title="Gauche (←)">◀</button>
    <button class="nav-btn" id="pan-right" title="Droite (→)">▶</button>
    <button class="nav-btn" id="fit-all" title="Vue complète (F)">⊞</button>
  </div>
</nav>

<div id="canvas-area">
  <div class="canvas-row" id="overview-row">
    <span class="canvas-label">Vue d'ensemble</span>
    <canvas id="overview-canvas"></canvas>
  </div>
  <div class="canvas-row" id="density-row">
    <span class="canvas-label">Densité (segments / 15 min)</span>
    <canvas id="density-canvas"></canvas>
  </div>
  <div class="canvas-row" id="timeline-row">
    <canvas id="timeline-canvas"></canvas>
  </div>
</div>

<div id="tooltip"></div>

<div id="detail-panel">
  <div id="detail-header">
    <h3 id="detail-title">Segment</h3>
    <button id="close-detail">&times;</button>
  </div>
  <div id="media-container"></div>
  <div id="detail-content"></div>
</div>

<div id="kbd-help">
  <span><kbd>Molette</kbd> zoom</span>
  <span><kbd>←</kbd><kbd>→</kbd> naviguer</span>
  <span><kbd>1</kbd>-<kbd>7</kbd> jours</span>
  <span><kbd>F</kbd> vue complète</span>
  <span><kbd>Échap</kbd> fermer</span>
</div>

<script id="embedded-data" type="application/json">null</script>
<script>
(function() {
"use strict";

// ───────────────────────────────────────────────────────────
//  Data loading
// ───────────────────────────────────────────────────────────
const DATA = JSON.parse(document.getElementById("embedded-data").textContent);
const SEGMENTS = DATA.segments;
const PARTS = DATA.parts;
const GROUPS = DATA.groups;
const ANNOTATIONS = DATA.annotations;
const DENSITY = DATA.density;
const PARAMS = DATA.params;
const T_MIN = DATA.timeRange.min;
const T_MAX = DATA.timeRange.max;
const STATS = DATA.stats;

// Segment lookup by id
const segById = {};
SEGMENTS.forEach(s => segById[s.id] = s);

// ───────────────────────────────────────────────────────────
//  Color palette for groups
// ───────────────────────────────────────────────────────────
const PALETTE = [
  "#FF6B6B","#4ECDC4","#45B7D1","#96CEB4","#FFEAA7",
  "#DDA0DD","#98D8C8","#F7DC6F","#BB8FCE","#85C1E9",
  "#F8C471","#82E0AA","#F1948A","#AED6F1","#D7BDE2",
  "#A3E4D7","#FAD7A0","#A9CCE3","#D5F5E3","#FADBD8",
  "#FF9F43","#EE5A24","#0ABDE3","#10AC84","#FDA7DF",
  "#C8D6E5","#576574","#F368E0","#48DBFB","#FF6348"
];
const UNGROUPED_COLOR = "#444455";
const ANNOTATION_COLORS = {
  "PUBLICITE": "#e05050",
  "JINGLE": "#f0c040",
  "EMISSION": "#4080e0",
  "AUTOPROMOTION": "#e080e0",
  "PARRAINAGE": "#40c0c0",
};
const DEFAULT_ANNOTATION_COLOR = "#808090";

function groupColor(gid, size) {
  if (gid < 0 || size <= 1) return UNGROUPED_COLOR;
  return PALETTE[gid % PALETTE.length];
}
function annotationColor(type) {
  return ANNOTATION_COLORS[type] || DEFAULT_ANNOTATION_COLOR;
}

// ───────────────────────────────────────────────────────────
//  Time utilities
// ───────────────────────────────────────────────────────────
const PARIS_TZ = "Europe/Paris";
function epochToDate(epoch) {
  return new Date(epoch * 1000);
}
function formatDateTime(epoch) {
  return epochToDate(epoch).toLocaleString("fr-FR", { timeZone: PARIS_TZ });
}
function formatTime(epoch) {
  return epochToDate(epoch).toLocaleString("fr-FR", {
    timeZone: PARIS_TZ, hour: "2-digit", minute: "2-digit", second: "2-digit"
  });
}
function formatDate(epoch) {
  return epochToDate(epoch).toLocaleString("fr-FR", {
    timeZone: PARIS_TZ, weekday: "short", day: "numeric", month: "short"
  });
}
function formatDuration(sec) {
  if (sec < 1) return sec.toFixed(2) + "s";
  if (sec < 60) return sec.toFixed(1) + "s";
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return m + "m" + (s ? s + "s" : "");
}
function formatDurationLong(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  if (h) return `${h}h ${m}m ${s}s`;
  if (m) return `${m}m ${s}s`;
  return `${s}s`;
}
function dayOfEpoch(epoch) {
  const d = epochToDate(epoch);
  // Day start in Paris TZ (approximate via offset)
  const str = d.toLocaleDateString("fr-CA", { timeZone: PARIS_TZ });
  return str;
}

// ───────────────────────────────────────────────────────────
//  View state
// ───────────────────────────────────────────────────────────
let viewStart = T_MIN;
let viewEnd = T_MAX;
let selectedSegment = null;
let highlightedGroup = -1;
const MIN_VIEW_SPAN = 30;       // 30 seconds minimum
const MAX_VIEW_SPAN = T_MAX - T_MIN || 86400 * 7;

// Sorted segments for binary search
const sortedSegments = [...SEGMENTS].sort((a, b) => a.absStart - b.absStart);

function visibleSegments() {
  // Binary search for first visible segment
  let lo = 0, hi = sortedSegments.length;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (sortedSegments[mid].absEnd < viewStart) lo = mid + 1;
    else hi = mid;
  }
  const result = [];
  for (let i = lo; i < sortedSegments.length; i++) {
    if (sortedSegments[i].absStart > viewEnd) break;
    result.push(sortedSegments[i]);
  }
  return result;
}

// ───────────────────────────────────────────────────────────
//  Canvas setup
// ───────────────────────────────────────────────────────────
const overviewCanvas = document.getElementById("overview-canvas");
const densityCanvas = document.getElementById("density-canvas");
const timelineCanvas = document.getElementById("timeline-canvas");
const overviewCtx = overviewCanvas.getContext("2d");
const densityCtx = densityCanvas.getContext("2d");
const timelineCtx = timelineCanvas.getContext("2d");

function resizeCanvas(canvas, container) {
  const dpr = window.devicePixelRatio || 1;
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w: rect.width, h: rect.height };
}

function resizeAll() {
  resizeCanvas(overviewCanvas, document.getElementById("overview-row"));
  resizeCanvas(densityCanvas, document.getElementById("density-row"));
  resizeCanvas(timelineCanvas, document.getElementById("timeline-row"));
  render();
}

// ───────────────────────────────────────────────────────────
//  Coordinate transforms
// ───────────────────────────────────────────────────────────
function epochToX(epoch, x0, w, tMin, tMax) {
  return x0 + (epoch - tMin) / (tMax - tMin) * w;
}
function xToEpoch(x, x0, w, tMin, tMax) {
  return tMin + (x - x0) / w * (tMax - tMin);
}

// ───────────────────────────────────────────────────────────
//  Render: Overview
// ───────────────────────────────────────────────────────────
function renderOverview() {
  const rect = overviewCanvas.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  const ctx = overviewCtx;
  ctx.clearRect(0, 0, W, H);

  if (T_MAX <= T_MIN) return;

  // Parts as blocks
  PARTS.forEach(p => {
    const x1 = epochToX(p.startDate, 0, W, T_MIN, T_MAX);
    const x2 = epochToX(p.endDate, 0, W, T_MIN, T_MAX);
    ctx.fillStyle = "rgba(30, 30, 54, 0.8)";
    ctx.fillRect(x1, 0, Math.max(x2 - x1, 1), H);
  });

  // Segments as lines
  SEGMENTS.forEach(s => {
    const x = epochToX(s.absStart, 0, W, T_MIN, T_MAX);
    const xw = Math.max(epochToX(s.absEnd, 0, W, T_MIN, T_MAX) - x, 0.5);
    ctx.fillStyle = groupColor(s.groupId, s.groupSize);
    ctx.globalAlpha = s.groupSize > 1 ? 0.8 : 0.3;
    ctx.fillRect(x, 2, xw, H - 4);
  });
  ctx.globalAlpha = 1.0;

  // Viewport rectangle
  const vx1 = epochToX(viewStart, 0, W, T_MIN, T_MAX);
  const vx2 = epochToX(viewEnd, 0, W, T_MIN, T_MAX);
  ctx.strokeStyle = "var(--primary)";
  ctx.strokeStyle = "#00d2a0";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(vx1, 0.5, vx2 - vx1, H - 1);
  ctx.fillStyle = "rgba(0, 210, 160, 0.08)";
  ctx.fillRect(vx1, 0, vx2 - vx1, H);
}

// ───────────────────────────────────────────────────────────
//  Render: Density
// ───────────────────────────────────────────────────────────
function renderDensity() {
  const rect = densityCanvas.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  const ctx = densityCtx;
  ctx.clearRect(0, 0, W, H);

  const bins = DENSITY.total;
  const binsGrouped = DENSITY.grouped;
  const binSize = DENSITY.binSize;
  if (!bins.length) return;

  const maxVal = Math.max(...bins, 1);
  const pad = 20;
  const plotH = H - pad;

  // Find visible bin range
  const binStart = Math.max(0, Math.floor((viewStart - T_MIN) / binSize) - 1);
  const binEnd = Math.min(bins.length - 1, Math.ceil((viewEnd - T_MIN) / binSize) + 1);

  // Total segments area
  ctx.beginPath();
  ctx.moveTo(epochToX(T_MIN + binStart * binSize, 0, W, viewStart, viewEnd), H);
  for (let i = binStart; i <= binEnd; i++) {
    const t = T_MIN + (i + 0.5) * binSize;
    const x = epochToX(t, 0, W, viewStart, viewEnd);
    const y = H - (bins[i] / maxVal) * plotH;
    if (i === binStart) ctx.lineTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.lineTo(epochToX(T_MIN + (binEnd + 0.5) * binSize, 0, W, viewStart, viewEnd), H);
  ctx.closePath();
  ctx.fillStyle = "rgba(100, 110, 130, 0.2)";
  ctx.fill();

  // Grouped segments area
  ctx.beginPath();
  ctx.moveTo(epochToX(T_MIN + binStart * binSize, 0, W, viewStart, viewEnd), H);
  for (let i = binStart; i <= binEnd; i++) {
    const t = T_MIN + (i + 0.5) * binSize;
    const x = epochToX(t, 0, W, viewStart, viewEnd);
    const y = H - (binsGrouped[i] / maxVal) * plotH;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(epochToX(T_MIN + (binEnd + 0.5) * binSize, 0, W, viewStart, viewEnd), H);
  ctx.closePath();
  ctx.fillStyle = "rgba(0, 210, 160, 0.25)";
  ctx.fill();

  // Lines
  ctx.beginPath();
  for (let i = binStart; i <= binEnd; i++) {
    const t = T_MIN + (i + 0.5) * binSize;
    const x = epochToX(t, 0, W, viewStart, viewEnd);
    const y = H - (bins[i] / maxVal) * plotH;
    if (i === binStart) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = "rgba(150, 160, 180, 0.5)";
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.beginPath();
  for (let i = binStart; i <= binEnd; i++) {
    const t = T_MIN + (i + 0.5) * binSize;
    const x = epochToX(t, 0, W, viewStart, viewEnd);
    const y = H - (binsGrouped[i] / maxVal) * plotH;
    if (i === binStart) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = "#00d2a0";
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Y-axis label
  ctx.fillStyle = "#606878";
  ctx.font = "10px " + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = "right";
  ctx.fillText(maxVal.toString(), W - 6, 14);

  // Legend
  ctx.textAlign = "left";
  ctx.fillStyle = "rgba(150, 160, 180, 0.5)";
  ctx.fillRect(80, 4, 10, 10);
  ctx.fillStyle = "#606878";
  ctx.fillText("Total", 94, 13);
  ctx.fillStyle = "rgba(0, 210, 160, 0.6)";
  ctx.fillRect(140, 4, 10, 10);
  ctx.fillStyle = "#606878";
  ctx.fillText("Groupés", 154, 13);
}

// ───────────────────────────────────────────────────────────
//  Render: Timeline
// ───────────────────────────────────────────────────────────
const TRACK_PARTS_Y = 0;
const TRACK_PARTS_H = 18;
const TRACK_SEG_Y = 22;
const TRACK_ANNOT_H = 16;
const TRACK_GAP = 4;

function renderTimeline() {
  const rect = timelineCanvas.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  const ctx = timelineCtx;
  ctx.clearRect(0, 0, W, H);

  if (T_MAX <= T_MIN) return;

  const span = viewEnd - viewStart;

  // ── Time grid ──────────────────────────────────
  const gridIntervals = [
    60, 300, 900, 1800, 3600, 7200, 14400, 21600, 43200, 86400
  ];
  let gridStep = gridIntervals[0];
  for (const gi of gridIntervals) {
    if (W / (span / gi) > 50) { gridStep = gi; break; }
  }

  const gridStart = Math.floor(viewStart / gridStep) * gridStep;
  ctx.strokeStyle = "rgba(50, 50, 80, 0.5)";
  ctx.lineWidth = 0.5;
  ctx.font = "10px " + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle = "#505068";
  ctx.textAlign = "center";

  for (let t = gridStart; t <= viewEnd; t += gridStep) {
    const x = epochToX(t, 0, W, viewStart, viewEnd);
    if (x < 0 || x > W) continue;

    // Day boundaries are thicker
    const d = epochToDate(t);
    const hours = parseInt(d.toLocaleString("fr-FR", { timeZone: PARIS_TZ, hour: "2-digit", hour12: false }));
    const minutes = d.getMinutes();
    const isDayBoundary = hours === 0 && minutes === 0 && gridStep <= 86400;

    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.strokeStyle = isDayBoundary ? "rgba(100, 100, 150, 0.6)" : "rgba(50, 50, 80, 0.3)";
    ctx.lineWidth = isDayBoundary ? 1.5 : 0.5;
    ctx.stroke();

    // Label
    let label;
    if (gridStep >= 86400) label = formatDate(t);
    else if (gridStep >= 3600) label = formatTime(t).slice(0, 5);
    else label = formatTime(t);
    ctx.fillText(label, x, H - 4);
  }

  // ── Parts track ────────────────────────────────
  PARTS.forEach(p => {
    const x1 = Math.max(epochToX(p.startDate, 0, W, viewStart, viewEnd), 0);
    const x2 = Math.min(epochToX(p.endDate, 0, W, viewStart, viewEnd), W);
    if (x2 < 0 || x1 > W) return;
    ctx.fillStyle = "rgba(30, 30, 60, 0.5)";
    ctx.fillRect(x1, TRACK_PARTS_Y, x2 - x1, TRACK_PARTS_H);
    ctx.strokeStyle = "rgba(80, 80, 120, 0.4)";
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x1, TRACK_PARTS_Y, x2 - x1, TRACK_PARTS_H);

    // Part label if wide enough
    if (x2 - x1 > 60) {
      ctx.fillStyle = "#707088";
      ctx.font = "9px " + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = "left";
      ctx.fillText(formatTime(p.startDate).slice(0, 5) + " - " + formatTime(p.endDate).slice(0, 5), x1 + 4, TRACK_PARTS_Y + 12);
    }
  });

  // ── Segments track ─────────────────────────────
  const TRACK_SEG_H = Math.max(30, H - TRACK_SEG_Y - TRACK_ANNOT_H - TRACK_GAP - 20);
  const visSeg = visibleSegments();

  // If group is highlighted, draw highlight backgrounds first
  if (highlightedGroup >= 0) {
    visSeg.forEach(s => {
      if (s.groupId !== highlightedGroup) return;
      const x1 = epochToX(s.absStart, 0, W, viewStart, viewEnd);
      const x2 = epochToX(s.absEnd, 0, W, viewStart, viewEnd);
      ctx.fillStyle = "rgba(0, 210, 160, 0.15)";
      ctx.fillRect(x1 - 2, TRACK_SEG_Y - 2, Math.max(x2 - x1 + 4, 6), TRACK_SEG_H + 4);
    });
  }

  visSeg.forEach(s => {
    const x1 = epochToX(s.absStart, 0, W, viewStart, viewEnd);
    const x2 = epochToX(s.absEnd, 0, W, viewStart, viewEnd);
    const sw = Math.max(x2 - x1, 1.5);
    const color = groupColor(s.groupId, s.groupSize);

    // Height proportional to group size (min 8px, max full track)
    const maxGroupSize = 20;
    const hRatio = s.groupSize > 1 ? Math.min(s.groupSize / maxGroupSize, 1) : 0.25;
    const sh = Math.max(8, hRatio * TRACK_SEG_H);
    const sy = TRACK_SEG_Y + (TRACK_SEG_H - sh);

    ctx.fillStyle = color;
    ctx.globalAlpha = s.groupSize > 1 ? 0.8 : 0.35;
    ctx.fillRect(x1, sy, sw, sh);

    // Border for selected
    if (selectedSegment && s.id === selectedSegment.id) {
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.strokeRect(x1 - 1, sy - 1, sw + 2, sh + 2);
    }
    ctx.globalAlpha = 1;

    // Label if wide enough
    if (sw > 40) {
      ctx.fillStyle = "#fff";
      ctx.font = "bold 9px " + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = "center";
      const label = s.groupSize > 1 ? `G${s.groupId}(${s.groupSize}x)` : `#${s.id}`;
      ctx.fillText(label, x1 + sw / 2, sy + sh / 2 + 3);
    }
  });

  // ── Annotations track ──────────────────────────
  const TRACK_ANNOT_Y = TRACK_SEG_Y + TRACK_SEG_H + TRACK_GAP;
  ANNOTATIONS.forEach(a => {
    const x1 = Math.max(epochToX(a.start, 0, W, viewStart, viewEnd), 0);
    const x2 = Math.min(epochToX(a.end, 0, W, viewStart, viewEnd), W);
    if (x2 < 0 || x1 > W) return;
    const aw = Math.max(x2 - x1, 2);

    ctx.fillStyle = annotationColor(a.type);
    ctx.globalAlpha = 0.5;
    ctx.fillRect(x1, TRACK_ANNOT_Y, aw, TRACK_ANNOT_H);
    ctx.globalAlpha = 1;

    if (aw > 30) {
      ctx.fillStyle = "#fff";
      ctx.font = "bold 9px " + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = "center";
      ctx.fillText(a.type, x1 + aw / 2, TRACK_ANNOT_Y + TRACK_ANNOT_H - 4);
    }
  });

  // Track labels
  ctx.fillStyle = "#505068";
  ctx.font = "9px " + getComputedStyle(document.body).fontFamily;
  ctx.textAlign = "left";
  ctx.fillText("Parties", 4, TRACK_PARTS_Y + 12);
  ctx.fillText("Segments", 4, TRACK_SEG_Y + 10);
  if (ANNOTATIONS.length) ctx.fillText("Annotations", 4, TRACK_ANNOT_Y + 11);
}

// ───────────────────────────────────────────────────────────
//  Render all
// ───────────────────────────────────────────────────────────
function render() {
  renderOverview();
  renderDensity();
  renderTimeline();
  updateZoomLabel();
}

function updateZoomLabel() {
  const span = viewEnd - viewStart;
  let label;
  if (span > 86400 * 2) label = (span / 86400).toFixed(1) + " jours";
  else if (span > 3600 * 2) label = (span / 3600).toFixed(1) + " heures";
  else if (span > 60 * 2) label = (span / 60).toFixed(0) + " min";
  else label = span.toFixed(0) + " sec";
  document.getElementById("zoom-label").textContent = label;
}

// ───────────────────────────────────────────────────────────
//  Zoom & Pan
// ───────────────────────────────────────────────────────────
function zoomAt(factor, centerEpoch) {
  const span = viewEnd - viewStart;
  const newSpan = Math.max(MIN_VIEW_SPAN, Math.min(MAX_VIEW_SPAN, span * factor));
  const ratio = (centerEpoch - viewStart) / span;
  viewStart = centerEpoch - ratio * newSpan;
  viewEnd = centerEpoch + (1 - ratio) * newSpan;
  clampView();
  render();
}

function panBy(fraction) {
  const span = viewEnd - viewStart;
  const shift = span * fraction;
  viewStart += shift;
  viewEnd += shift;
  clampView();
  render();
}

function clampView() {
  const span = viewEnd - viewStart;
  if (viewStart < T_MIN - span * 0.1) {
    viewStart = T_MIN - span * 0.1;
    viewEnd = viewStart + span;
  }
  if (viewEnd > T_MAX + span * 0.1) {
    viewEnd = T_MAX + span * 0.1;
    viewStart = viewEnd - span;
  }
}

function fitAll() {
  viewStart = T_MIN;
  viewEnd = T_MAX;
  render();
}

function zoomToDay(dayStr) {
  // Find parts that belong to this day
  let dayMin = Infinity, dayMax = -Infinity;
  PARTS.forEach(p => {
    if (dayOfEpoch(p.startDate) === dayStr) {
      dayMin = Math.min(dayMin, p.startDate);
      dayMax = Math.max(dayMax, p.endDate);
    }
  });
  if (dayMin === Infinity) {
    // No parts for this day, calculate from epoch
    // Find the day boundaries
    const allDays = [...new Set(PARTS.map(p => dayOfEpoch(p.startDate)))];
    const idx = allDays.indexOf(dayStr);
    if (idx >= 0) {
      const p = PARTS.find(p => dayOfEpoch(p.startDate) === dayStr);
      if (p) { dayMin = p.startDate; dayMax = p.endDate; }
    }
    if (dayMin === Infinity) return;
  }
  // Add 5% padding
  const pad = (dayMax - dayMin) * 0.05;
  viewStart = dayMin - pad;
  viewEnd = dayMax + pad;
  clampView();
  render();
  updateDayButtons();
}

// ───────────────────────────────────────────────────────────
//  Hit testing
// ───────────────────────────────────────────────────────────
function segmentAtPosition(canvasX, canvasY) {
  const rect = timelineCanvas.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  const TRACK_SEG_H = Math.max(30, H - TRACK_SEG_Y - TRACK_ANNOT_H - TRACK_GAP - 20);

  const visSeg = visibleSegments();
  // Reverse order so topmost (last drawn) is checked first
  for (let i = visSeg.length - 1; i >= 0; i--) {
    const s = visSeg[i];
    const x1 = epochToX(s.absStart, 0, W, viewStart, viewEnd);
    const x2 = epochToX(s.absEnd, 0, W, viewStart, viewEnd);
    const sw = Math.max(x2 - x1, 4);

    const maxGroupSize = 20;
    const hRatio = s.groupSize > 1 ? Math.min(s.groupSize / maxGroupSize, 1) : 0.25;
    const sh = Math.max(8, hRatio * TRACK_SEG_H);
    const sy = TRACK_SEG_Y + (TRACK_SEG_H - sh);

    if (canvasX >= x1 - 2 && canvasX <= x1 + sw + 2 && canvasY >= sy && canvasY <= sy + sh) {
      return s;
    }
  }
  return null;
}

// ───────────────────────────────────────────────────────────
//  Detail Panel
// ───────────────────────────────────────────────────────────
function showDetail(seg) {
  selectedSegment = seg;
  highlightedGroup = seg.groupSize > 1 ? seg.groupId : -1;

  const panel = document.getElementById("detail-panel");
  panel.classList.add("open");

  document.getElementById("detail-title").textContent =
    `Segment #${seg.id}` + (seg.groupSize > 1 ? ` — Groupe ${seg.groupId}` : "");

  // Media
  const part = PARTS[seg.partIdx];
  const mediaContainer = document.getElementById("media-container");
  const isVideo = part.mediaUrl && (part.mediaUrl.includes(".mp4") || part.mediaUrl.includes(".webm") || part.mediaUrl.includes(".mov"));

  if (part.mediaUrl) {
    if (isVideo) {
      mediaContainer.innerHTML = `<video id="player" controls preload="metadata"></video>`;
    } else {
      mediaContainer.innerHTML = `<audio id="player" controls preload="metadata" style="width:100%;padding:8px 0;"></audio>`;
    }
    const player = document.getElementById("player");
    // Only reload if different source
    if (player.getAttribute("data-src") !== part.mediaUrl) {
      player.src = part.mediaUrl;
      player.setAttribute("data-src", part.mediaUrl);
    }
    // Seek to segment position
    player.currentTime = seg.localStart;
    player.addEventListener("loadedmetadata", function onMeta() {
      player.currentTime = seg.localStart;
      player.removeEventListener("loadedmetadata", onMeta);
    });
  } else {
    mediaContainer.innerHTML = '<div style="padding:20px;color:var(--text3);text-align:center;">Aucun média disponible</div>';
  }

  // Segment info
  let html = '<div class="detail-section"><h4>Informations du segment</h4><div class="info-grid">';
  html += `<span class="label">ID</span><span class="value">#${seg.id}</span>`;
  html += `<span class="label">Durée</span><span class="value">${formatDuration(seg.duration)}</span>`;
  html += `<span class="label">Début (absolu)</span><span class="value">${formatDateTime(seg.absStart)}</span>`;
  html += `<span class="label">Fin (absolu)</span><span class="value">${formatDateTime(seg.absEnd)}</span>`;
  html += `<span class="label">Début (local)</span><span class="value">${formatDuration(seg.localStart)}</span>`;
  html += `<span class="label">Énergie RMS</span><span class="value">${seg.rms.toFixed(4)}</span>`;
  html += `<span class="label">Centroïde spectral</span><span class="value">${seg.sc.toFixed(1)} Hz</span>`;
  html += `<span class="label">ZCR</span><span class="value">${seg.zcr.toFixed(4)}</span>`;
  html += `<span class="label">Partie</span><span class="value">#${seg.partIdx}</span>`;
  html += '</div></div>';

  // Group info
  if (seg.groupSize > 1) {
    const color = groupColor(seg.groupId, seg.groupSize);
    html += '<div class="detail-section"><h4>Groupe</h4>';
    html += `<div style="margin-bottom:8px;">`;
    html += `<span class="group-badge" style="background:${color};color:#000;">${seg.groupSize} occurrences</span> `;
    if (seg.classification) {
      html += `<span style="color:var(--text2);font-size:12px;">${seg.classification}</span>`;
    }
    html += `</div>`;
    html += `<div class="info-grid" style="margin-bottom:8px;">`;
    html += `<span class="label">Durée moyenne</span><span class="value">${seg.durationMean.toFixed(2)}s</span>`;
    html += `<span class="label">Écart-type</span><span class="value">${seg.durationStd.toFixed(2)}s</span>`;
    html += `</div>`;

    html += '<h4>Membres du groupe</h4>';
    html += '<ul class="member-list">';
    seg.memberIds.forEach(mid => {
      const m = segById[mid];
      if (!m) return;
      const isCurrent = m.id === seg.id;
      html += `<li class="member-item${isCurrent ? ' current' : ''}" data-seg-id="${m.id}">`;
      html += `<span class="m-time">${formatDateTime(m.absStart)}</span>`;
      html += `<span class="m-dur">${formatDuration(m.duration)}</span>`;
      html += `</li>`;
    });
    html += '</ul>';
  } else {
    html += '<div class="detail-section"><h4>Groupe</h4>';
    html += '<div style="color:var(--text3);font-size:12px;">Ce segment n\'appartient à aucun groupe (occurrence unique).</div>';
    html += '</div>';
  }

  document.getElementById("detail-content").innerHTML = html;

  // Click handlers for group members
  document.querySelectorAll(".member-item").forEach(el => {
    el.addEventListener("click", () => {
      const sid = parseInt(el.getAttribute("data-seg-id"));
      const s = segById[sid];
      if (s) navigateToSegment(s);
    });
  });

  render();
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("open");
  selectedSegment = null;
  highlightedGroup = -1;
  render();
}

function navigateToSegment(seg) {
  // Center the view on this segment
  const segCenter = (seg.absStart + seg.absEnd) / 2;
  const currentSpan = viewEnd - viewStart;
  const segDuration = seg.absEnd - seg.absStart;
  // Ensure segment is visible: zoom to at least 10x segment duration
  const minSpan = Math.max(segDuration * 10, 60);
  const newSpan = Math.min(currentSpan, Math.max(minSpan, currentSpan));

  viewStart = segCenter - newSpan / 2;
  viewEnd = segCenter + newSpan / 2;
  clampView();

  showDetail(seg);
}

// ───────────────────────────────────────────────────────────
//  Tooltip
// ───────────────────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");
function showTooltip(seg, x, y) {
  let html = `<div class="tt-label">Segment #${seg.id}</div>`;
  html += `${formatDateTime(seg.absStart)}<br>`;
  html += `Durée : ${formatDuration(seg.duration)}`;
  if (seg.groupSize > 1) {
    html += `<br><span class="tt-group">Groupe ${seg.groupId} — ${seg.groupSize} occurrences</span>`;
    if (seg.classification) html += `<br>${seg.classification}`;
  }
  tooltip.innerHTML = html;
  tooltip.style.display = "block";

  // Position
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  let tx = x + 12, ty = y - th - 8;
  if (tx + tw > window.innerWidth) tx = x - tw - 12;
  if (ty < 0) ty = y + 16;
  tooltip.style.left = tx + "px";
  tooltip.style.top = ty + "px";
}
function hideTooltip() {
  tooltip.style.display = "none";
}

// ───────────────────────────────────────────────────────────
//  Event handlers: Timeline
// ───────────────────────────────────────────────────────────
let isDragging = false;
let dragStartX = 0;
let dragStartViewStart = 0;
let dragStartViewEnd = 0;
const timelineRow = document.getElementById("timeline-row");

timelineCanvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  const rect = timelineCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const center = xToEpoch(mx, 0, rect.width, viewStart, viewEnd);
  const factor = e.deltaY > 0 ? 1.2 : 1 / 1.2;
  zoomAt(factor, center);
}, { passive: false });

timelineCanvas.addEventListener("mousedown", (e) => {
  if (e.button !== 0) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartViewStart = viewStart;
  dragStartViewEnd = viewEnd;
  timelineRow.classList.add("grabbing");
});

window.addEventListener("mousemove", (e) => {
  if (isDragging) {
    const rect = timelineCanvas.getBoundingClientRect();
    const dx = e.clientX - dragStartX;
    const epochDx = dx / rect.width * (dragStartViewEnd - dragStartViewStart);
    viewStart = dragStartViewStart - epochDx;
    viewEnd = dragStartViewEnd - epochDx;
    clampView();
    render();
    hideTooltip();
  } else {
    // Tooltip
    const rect = timelineCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    if (mx >= 0 && mx <= rect.width && my >= 0 && my <= rect.height) {
      const seg = segmentAtPosition(mx, my);
      if (seg) {
        showTooltip(seg, e.clientX, e.clientY);
        timelineCanvas.style.cursor = "pointer";
      } else {
        hideTooltip();
        timelineCanvas.style.cursor = isDragging ? "grabbing" : "grab";
      }
    } else {
      hideTooltip();
    }
  }
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  timelineRow.classList.remove("grabbing");
});

timelineCanvas.addEventListener("click", (e) => {
  if (Math.abs(e.clientX - dragStartX) > 5) return; // was a drag
  const rect = timelineCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const seg = segmentAtPosition(mx, my);
  if (seg) showDetail(seg);
});

// ───────────────────────────────────────────────────────────
//  Event handlers: Overview (click to jump)
// ───────────────────────────────────────────────────────────
overviewCanvas.addEventListener("click", (e) => {
  const rect = overviewCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const epoch = xToEpoch(mx, 0, rect.width, T_MIN, T_MAX);
  const span = viewEnd - viewStart;
  viewStart = epoch - span / 2;
  viewEnd = epoch + span / 2;
  clampView();
  render();
});
overviewCanvas.style.cursor = "crosshair";

// Density zoom
densityCanvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  const rect = densityCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const center = xToEpoch(mx, 0, rect.width, viewStart, viewEnd);
  const factor = e.deltaY > 0 ? 1.2 : 1 / 1.2;
  zoomAt(factor, center);
}, { passive: false });

// ───────────────────────────────────────────────────────────
//  Event handlers: Keyboard
// ───────────────────────────────────────────────────────────
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

  switch(e.key) {
    case "ArrowLeft": e.preventDefault(); panBy(-0.2); break;
    case "ArrowRight": e.preventDefault(); panBy(0.2); break;
    case "+": case "=": e.preventDefault(); zoomAt(0.5, (viewStart + viewEnd) / 2); break;
    case "-": e.preventDefault(); zoomAt(2, (viewStart + viewEnd) / 2); break;
    case "f": case "F": fitAll(); break;
    case "Escape": closeDetail(); break;
    case "1": case "2": case "3": case "4": case "5": case "6": case "7":
      const dayIdx = parseInt(e.key) - 1;
      const dayBtns = document.querySelectorAll(".day-btn");
      if (dayBtns[dayIdx]) dayBtns[dayIdx].click();
      break;
  }
});

// ───────────────────────────────────────────────────────────
//  Event handlers: Buttons
// ───────────────────────────────────────────────────────────
document.getElementById("zoom-in").addEventListener("click", () => zoomAt(0.5, (viewStart + viewEnd) / 2));
document.getElementById("zoom-out").addEventListener("click", () => zoomAt(2, (viewStart + viewEnd) / 2));
document.getElementById("pan-left").addEventListener("click", () => panBy(-0.3));
document.getElementById("pan-right").addEventListener("click", () => panBy(0.3));
document.getElementById("fit-all").addEventListener("click", fitAll);
document.getElementById("close-detail").addEventListener("click", closeDetail);

document.getElementById("params-toggle").addEventListener("click", () => {
  document.getElementById("params-panel").classList.toggle("open");
});

// ───────────────────────────────────────────────────────────
//  Initialize
// ───────────────────────────────────────────────────────────
function init() {
  // Stats
  document.getElementById("stat-segments").textContent = STATS.totalSegments;
  document.getElementById("stat-grouped").textContent = STATS.groupedSegments;
  document.getElementById("stat-groups").textContent = STATS.totalGroups;
  document.getElementById("stat-parts").textContent = STATS.totalParts;
  document.getElementById("stat-annotations").textContent = STATS.totalAnnotations;

  // Params
  if (PARAMS && Object.keys(PARAMS).length) {
    let html = "<table>";
    for (const [k, v] of Object.entries(PARAMS)) {
      const val = typeof v === "object" ? JSON.stringify(v) : String(v);
      html += `<tr><td>${k}</td><td>${val}</td></tr>`;
    }
    html += "</table>";
    document.getElementById("params-panel").innerHTML = html;
  } else {
    document.getElementById("params-toggle").style.display = "none";
  }

  // Day buttons
  const days = [];
  const daySet = new Set();
  PARTS.forEach(p => {
    const d = dayOfEpoch(p.startDate);
    if (!daySet.has(d)) {
      daySet.add(d);
      days.push({ key: d, label: formatDate(p.startDate), epoch: p.startDate });
    }
  });
  days.sort((a, b) => a.epoch - b.epoch);

  const container = document.getElementById("day-buttons");
  days.forEach((d, i) => {
    const btn = document.createElement("button");
    btn.className = "day-btn";
    btn.textContent = d.label;
    btn.setAttribute("data-day", d.key);
    btn.addEventListener("click", () => {
      zoomToDay(d.key);
      document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });
    container.appendChild(btn);
  });

  // Resize
  window.addEventListener("resize", resizeAll);
  resizeAll();
}

function updateDayButtons() {
  const center = (viewStart + viewEnd) / 2;
  const centerDay = dayOfEpoch(center);
  document.querySelectorAll(".day-btn").forEach(btn => {
    btn.classList.toggle("active", btn.getAttribute("data-day") === centerDay);
  });
}

init();

})();
</script>
</body>
