---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - fail2ban
      - unattended-upgrades
      - ufw
    state: present

# --- SSH hardening ---

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
  notify: restart sshd

- name: Disable SSH root login with password
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin prohibit-password"
  notify: restart sshd

- name: Disable SSH X11 forwarding
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?X11Forwarding"
    line: "X11Forwarding no"
  notify: restart sshd

- name: Set SSH MaxAuthTries
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?MaxAuthTries"
    line: "MaxAuthTries 3"
  notify: restart sshd

# --- fail2ban ---

- name: Configure fail2ban SSH jail
  copy:
    dest: /etc/fail2ban/jail.d/sshd.conf
    content: |
      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      maxretry = 5
      bantime = 3600
      findtime = 600
    mode: "0644"
  notify: restart fail2ban

- name: Enable and start fail2ban
  systemd:
    name: fail2ban
    enabled: true
    state: started

# --- Unattended upgrades ---

- name: Enable unattended security upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: "0644"

# --- Kernel hardening ---

- name: Apply sysctl hardening
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
  loop:
    - { key: net.ipv4.conf.all.rp_filter, value: "1" }
    - { key: net.ipv4.conf.default.rp_filter, value: "1" }
    - { key: net.ipv4.icmp_echo_ignore_broadcasts, value: "1" }
    - { key: net.ipv4.conf.all.accept_redirects, value: "0" }
    - { key: net.ipv4.conf.default.accept_redirects, value: "0" }
    - { key: net.ipv4.conf.all.send_redirects, value: "0" }
    - { key: net.ipv4.conf.default.send_redirects, value: "0" }
    - { key: net.ipv4.tcp_syncookies, value: "1" }
    - { key: net.ipv4.conf.all.log_martians, value: "1" }

# --- Firewall (UFW is the sole firewall — Elastic Metal has no Scaleway security group) ---

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled

# --- Docker ---

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Harden Docker daemon configuration
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "icc": false,
        "no-new-privileges": true,
        "userland-proxy": false,
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
    mode: "0644"
  notify: restart docker

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: true
    state: started

- name: Create shared Docker network for Traefik
  community.docker.docker_network:
    name: traefik-public
    state: present

- name: Create services base directory
  file:
    path: /opt/services
    state: directory
    mode: "0755"
