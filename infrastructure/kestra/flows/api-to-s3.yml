id: api-to-s3
namespace: quotaclimat.barometre
description: |
  Fetch Mediatree API data and store directly to S3.
  Used for countries/channels that bypass the main import pipeline.

labels:
  pipeline: barometre
  source: mediatree

inputs:
  - id: image_tag
    type: STRING
    defaults: latest
  - id: country
    type: STRING
    defaults: bel-fla
  - id: number_of_previous_days
    type: STRING
    defaults: "3"

tasks:
  - id: api_to_s3
    type: io.kestra.plugin.docker.Run
    containerImage: "{{ kv('CONTAINER_REGISTRY') }}/quotaclimat_base:{{ inputs.image_tag }}"
    commands:
      - python
      - quotaclimat/data_processing/mediatree/s3/api_to_s3.py
    env:
      ENV: prod
      LOGLEVEL: INFO
      PYTHONPATH: /app
      PORT_HS: "5666"
      HEALTHCHECK_SERVER: "0.0.0.0"
      COUNTRY: "{{ inputs.country }}"
      NUMBER_OF_PREVIOUS_DAYS: "{{ inputs.number_of_previous_days }}"
      MODIN_ENGINE: ray
      MODIN_CPUS: "6"
      MODIN_MEMORY: "12000000000"
      RAY_memory_usage_threshold: "0.95"
      MEDIATREE_USER: "{{ secret('MEDIATREE_USER') }}"
      MEDIATREE_PASSWORD: "{{ secret('MEDIATREE_PASSWORD') }}"
      MEDIATREE_AUTH_URL: https://keywords.mediatree.fr/api/auth/token/
      KEYWORDS_URL: https://keywords.mediatree.fr/api/v2/subtitle/
      BUCKET: "{{ secret('SCW_BUCKET') }}"
      BUCKET_NAME: "{{ kv('BUCKET_NAME') }}"
      BUCKET_SECRET: "{{ secret('SCW_BUCKET_SECRET') }}"
