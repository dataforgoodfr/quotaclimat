id: factiva-streaming
namespace: quotaclimat.factiva
description: |
  Long-running Factiva streaming job.
  Continuously pulls articles from Factiva API and stores to S3.
  Restarts automatically on failure.

labels:
  pipeline: factiva
  source: factiva-api

inputs:
  - id: image_tag
    type: STRING
    defaults: latest

tasks:
  - id: factiva_to_s3
    type: io.kestra.plugin.docker.Run
    containerImage: "{{ kv('CONTAINER_REGISTRY') }}/factiva_to_s3:{{ inputs.image_tag }}"
    env:
      LOGLEVEL: INFO
      PYTHONPATH: /app
      PORT_HS: "5050"
      HEALTHCHECK_SERVER: "0.0.0.0"
      FACTIVA_USERKEY_FILE: "{{ secret('FACTIVA_USERKEY') }}"
      FACTIVA_SUBSCRIPTION_ID_FILE: "{{ secret('FACTIVA_SUBSCRIPTION_ID') }}"
      FACTIVA_S3_BUCKET: factiva
      FACTIVA_S3_PREFIX: country_france
      FACTIVA_BATCH_SIZE: "100"
      FACTIVA_MAX_EMPTY_PULLS: "3"
      FACTIVA_EMPTY_PULL_WAIT: "5"
      FACTIVA_PULL_TIMEOUT: "30"
      FACTIVA_LOCAL_TMP: /tmp/factiva
      FACTIVA_MOCK_MODE: "false"
      BUCKET: "{{ secret('SCW_BUCKET') }}"
      BUCKET_SECRET: "{{ secret('SCW_BUCKET_SECRET') }}"
