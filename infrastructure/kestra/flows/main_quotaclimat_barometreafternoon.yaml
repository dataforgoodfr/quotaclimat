id: barometre-afternoon
namespace: quotaclimat

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "30 12 * * *"
    timezone: Europe/Paris

tasks:
  - id: ingest_data_to_s3
    type: io.kestra.plugin.docker.Run
    containerImage: "rg.fr-par.scw.cloud/namespace-barometre/quotaclimat_base:latest"
    pullPolicy: ALWAYS
    credentials:
      registry: rg.fr-par.scw.cloud/namespace-barometre
      username: nologin
      password: "{{ secret('SCW_SECRET') }}"
    entryPoint:
      - /bin/sh
      - -c
      - cd /app && python /app/quotaclimat/data_processing/mediatree/s3/api_to_s3.py
    shmSize: 6gb
    env: 
      API_DATA_OVERWRITE: 1
      API_TO_S3_CONCURRENCY: 10
      BUCKET_NAME: mediatree
      COUNTRY: fra
      ENV: prod
      KEYWORDS_URL: https://keywords.mediatree.fr/api/subtitle/
      LOGLEVEL: INFO
      MEDIATREE_AUTH_URL: https://keywords.mediatree.fr/api/auth/token/
      MEDIATREE_USER: quotaclimat
      MODIN_CPUS: 2
      MODIN_ENGINE: python
      MODIN_MEMORY: 3000000000
      NUMBER_OF_PREVIOUS_DAYS: 1
      OMP_NUM_THREADS: 3
      PORT_HS: 5666
      START_DATE: "{{ now() | date('X') }}"
      BUCKET: "{{ secret('SCW_ACCESS') }}"
      BUCKET_SECRET: "{{ secret('SCW_SECRET') }}"
      MEDIATREE_PASSWORD: "{{ secret('MEDIATREE_PASSWORD') }}"
      SENTRY_DSN: "{{ secret('SENTRY_DSN') }}"

  - id: detect_keywords
    logLevel: WARN          # filter per-row INFO spam at the Kestra level (UI freeze fix)
    shmSize: 6gb
    type: io.kestra.plugin.docker.Run
    containerImage: "rg.fr-par.scw.cloud/namespace-barometre/quotaclimat_base:latest"
    pullPolicy: ALWAYS
    credentials:
      registry: rg.fr-par.scw.cloud/namespace-barometre
      username: nologin
      password: "{{ secret('SCW_SECRET') }}"
    entryPoint:
      - /bin/sh
      - -c
      - cd /app && /app/entrypoints/detect_keywords.sh
    env:
      BATCH_SIZE: 5000
      BUCKET_NAME: mediatree
      COMPARE_DURATION: true
      COUNTRY: all
      DBT_PROFILES_DIR: /app/my_dbt_project/dbt
      DBT_PROJECT_DIR: /app/my_dbt_project
      ENV: prod
      FILTER_DAYS_STOP_WORD: 3000
      HEALTHCHECK_SERVER: 0.0.0.0
      KEYWORDS_URL: https://keywords.mediatree.fr/api/v2/subtitle/
      LOGLEVEL: INFO
      MEDIATREE_AUTH_URL: https://keywords.mediatree.fr/api/auth/token/
      MEDIATREE_USER: quotaclimat
      MODIN_CPUS: 2
      MODIN_ENGINE: ray
      MODIN_MEMORY: 3000000000
      NUMBER_OF_PREVIOUS_DAYS: 1
      POSTGRES_DB: barometre
      POSTGRES_PORT: 22737
      RAY_COLOR_PREFIX: 1
      RAY_memory_monitor_refresh_ms: 0
      START_DATE: "{{ now() | date('X') }}"
      BUCKET: "{{ secret('SCW_ACCESS') }}"
      BUCKET_SECRET: "{{ secret('SCW_SECRET') }}"
      MEDIATREE_PASSWORD: "{{ secret('MEDIATREE_PASSWORD') }}"
      POSTGRES_USER: "{{ secret('POSTGRES_USER') }}"
      POSTGRES_HOST: "{{ secret('POSTGRES_HOST') }}"
      POSTGRES_PASSWORD: "{{ secret('POSTGRES_PASSWORD') }}"
      SENTRY_DSN: "{{ secret('SENTRY_DSN') }}"

  - id: detect_misinformation
    logLevel: WARN          # filter per-row INFO spam at the Kestra level (UI freeze fix)
    shmSize: 6gb
    type: io.kestra.plugin.docker.Run
    containerImage: "rg.fr-par.scw.cloud/misinformation/label-misinformation:latest"
    pullPolicy: ALWAYS
    credentials:
      registry: rg.fr-par.scw.cloud/misinformation
      username: nologin
      password: "{{ secret('SCW_SECRET') }}"
    entryPoint:
      - /bin/sh
      - -c
      - cd /app && python /app/main.py
    env: 
      APP_NAME: label-misinformation
      AWS_DEFAULT_REGION: fr-par
      BUCKET_INPUT: mediatree
      BUCKET_OUTPUT: mediatree
      BUCKET_OUTPUT_FOLDER: label-misinformation-input
      COUNTRY: france
      ENV: production
      KEYWORDS_URL: https://keywords.mediatree.fr/api/v2/subtitle/
      LABEL_MISINFORMATION_OVERWRITE=1
      LABEL_STUDIO_PROJECT: 6
      LABEL_STUDIO_PROJECT_ID: 4
      LABEL_STUDIO_URL: https://barometre7kfudatm-labelstudio.functions.fnc.fr-par.scw.cloud
      LOGLEVEL: INFO
      MEDIATREE_AUTH_URL: https://keywords.mediatree.fr/api/auth/token/
      MEDIATREE_USER: quotaclimat
      MODEL_NAME: ft:gpt-4o-mini-2024-07-18:personal::B1xWiJRm
      MODIN_MEMORY: 3000000000
      NUMBER_OF_PREVIOUS_DAYS: 1
      POSTGRES_DB: barometre
      POSTGRES_PORT: 22737
      RAY_COLOR_PREFIX: 1
      START_DATE: "{{ now() | date('yyyy-MM-dd') }}"
      API_LABEL_STUDIO_KEY: "{{ secret('API_LABEL_STUDIO_KEY') }}"
      BUCKET_ACCESS: "{{ secret('SCW_ACCESS') }}"
      BUCKET_SECRET: "{{ secret('SCW_SECRET') }}"
      MEDIATREE_PASSWORD: "{{ secret('MEDIATREE_PASSWORD') }}"
      OPENAI_API_KEY: "{{ secret('OPENAI_API_KEY') }}"
      POSTGRES_HOST: "{{ secret('POSTGRES_HOST') }}"
      POSTGRES_PASSWORD: "{{ secret('POSTGRES_PASSWORD_READ') }}"
      POSTGRES_USER: "{{ secret('POSTGRES_USER_READ') }}"
      SENTRY_DSN: "{{ secret('SENTRY_DSN') }}"

  - id: dbt_run_transformations
    shmSize: 6gb
    type: io.kestra.plugin.docker.Run
    containerImage: "rg.fr-par.scw.cloud/namespace-barometre/quotaclimat_base:latest"
    pullPolicy: ALWAYS
    credentials:
      registry: rg.fr-par.scw.cloud/namespace-barometre
      username: nologin
      password: "{{ secret('SCW_SECRET') }}"
    entryPoint:
      - /bin/sh
      - -c
      - cd /app && /app/entrypoints/dbt.sh
    env:
      DBT_ENV: dev
      DBT_PROFILES_DIR: /app/my_dbt_project/dbt
      DBT_PROJECT_DIR: /app/my_dbt_project
      LOGLEVEL: INFO
      MODIN_CPUS: 2
      MODIN_ENGINE: python
      MODIN_MEMORY: 3000000000
      POSTGRES_DB: barometre
      POSTGRES_PORT: 22737
      BUCKET: "{{ secret('SCW_ACCESS') }}"
      BUCKET_SECRET: "{{ secret('SCW_SECRET') }}"
      LABELSTUDIO_INGESTION_POSTGRES_USER: "{{ secret('POSTGRES_USER_READ') }}"
      LABELSTUDIO_INGESTION_POSTGRES_PASSWORD: "{{ secret('POSTGRES_PASSWORD_READ') }}"
      LABELSTUDIO_POSTGRES_HOST: "{{ secret('POSTGRES_HOST') }}"
      LABELSTUDIO_POSTGRES_PORT: 22737
      POSTGRES_USER: "{{ secret('POSTGRES_USER') }}"
      POSTGRES_HOST: "{{ secret('POSTGRES_HOST') }}"
      POSTGRES_PASSWORD: "{{ secret('POSTGRES_PASSWORD') }}"