id: rrs-clustering
namespace: quotaclimat.rrs
description: |
  RRS semantic clustering job.
  Uses LLM embeddings (Mistral/Anthropic) to cluster media segments.

labels:
  pipeline: rrs

inputs:
  - id: image_tag
    type: STRING
    defaults: latest
  - id: expiry_days
    type: STRING
    defaults: "30"
  - id: provider
    type: STRING
    defaults: anthropic

tasks:
  - id: clustering
    type: io.kestra.plugin.docker.Run
    containerImage: "{{ kv('RRS_REGISTRY') }}/rrs-base:{{ inputs.image_tag }}"
    commands:
      - python
      - -m
      - rrs.clustering.main
    env:
      PYTHONPATH: /app
      RRS_PG_HOST: "{{ kv('RRS_PG_HOST') }}"
      RRS_PG_PORT: "{{ kv('RRS_PG_PORT') }}"
      RRS_PG_DATABASE: "{{ kv('RRS_PG_DATABASE') }}"
      RRS_PG_USER: "{{ secret('RRS_PG_USER') }}"
      RRS_PG_PASSWORD: "{{ secret('RRS_PG_PASSWORD') }}"
      SPACY_MODEL: fr_core_news_sm
      WINDOW_SIZE: "3"
      OVERLAP_TOKENS: "30"
      PROVIDER: "{{ inputs.provider }}"
      MAX_CONCURRENT_REQUESTS: "5"
      MERGE_BATCH_SIZE: "30"
      MERGE_MAX_ROUNDS: "5"
      TARGET_CLUSTERS: "5"
      MIN_CLUSTERS: "7"
      MAX_CLUSTERS: "150"
      CLUSTER_SCALE: "1.0"
      LOW_THRESHOLD: "0.4"
      HIGH_THRESHOLD: "0.85"
      EMBEDDING_BACKEND: mistral
      EMBEDDING_MODEL: dangvantuan/sentence-camembert-large
      EXPIRY_DAYS: "{{ inputs.expiry_days }}"
      MISTRAL_API_KEY: "{{ secret('MISTRAL_API_KEY') }}"
      ANTHROPIC_API_KEY: "{{ secret('ANTHROPIC_API_KEY') }}"
