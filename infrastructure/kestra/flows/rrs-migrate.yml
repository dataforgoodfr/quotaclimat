id: rrs-migrate
namespace: quotaclimat.rrs
description: |
  RRS database migrations and seed data.
  Runs Alembic migrations, then upserts subjects and dictionary.
  Triggered manually or by CI/CD after image build.

labels:
  pipeline: rrs

inputs:
  - id: image_tag
    type: STRING
    defaults: latest

tasks:
  - id: migrate_and_seed
    type: io.kestra.plugin.docker.Run
    containerImage: "{{ kv('RRS_REGISTRY') }}/rrs-base:{{ inputs.image_tag }}"
    commands:
      - sh
      - rrs/scripts/migrate_and_seed.sh
    env:
      PYTHONPATH: /app
      RRS_PG_HOST: "{{ kv('RRS_PG_HOST') }}"
      RRS_PG_PORT: "{{ kv('RRS_PG_PORT') }}"
      RRS_PG_DATABASE: "{{ kv('RRS_PG_DATABASE') }}"
      RRS_PG_USER: "{{ secret('RRS_PG_USER') }}"
      RRS_PG_PASSWORD: "{{ secret('RRS_PG_PASSWORD') }}"
