<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuotaClimat — Chunk Comparator</title>
  <style>
    :root {
      --bg: #0c0c18;
      --surface: #161628;
      --surface2: #1e1e36;
      --surface3: #28284a;
      --border: #2a2a4a;
      --primary: #00d2a0;
      --primary-dim: #00805f;
      --accent: #f0c040;
      --accent-dim: #a08020;
      --danger: #e05050;
      --text: #e8ecf2;
      --text2: #b8c2d4;
      --text3: #8890a8;
      --chunk-zone: rgba(0, 210, 160, 0.12);
      --chunk-border: rgba(0, 210, 160, 0.6);
      --radius: 6px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow-y: auto;
    }

    /* ─── Header ─────────────────────────────────────── */
    #header {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 20px;
      position: sticky; top: 0; z-index: 100;
    }
    #logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    #logo .q { color: var(--primary); }
    #logo .c { color: var(--accent); }
    #header-info { font-size: 12px; color: var(--text2); }

    /* ─── Metadata comparison ────────────────────────── */
    .meta-section {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 16px 20px;
    }
    .meta-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
    }
    .meta-card h3 {
      font-size: 13px; color: var(--primary);
      margin-bottom: 8px; letter-spacing: 0.5px;
    }
    .meta-card.side-b h3 { color: var(--accent); }
    .meta-table { width: 100%; font-size: 12px; }
    .meta-table td { padding: 3px 8px; }
    .meta-table td:first-child { color: var(--text3); white-space: nowrap; }
    .meta-table td:last-child { font-family: var(--mono); text-align: right; }

    /* ─── Diff table ─────────────────────────────────── */
    .diff-section { padding: 0 20px 12px; }
    .diff-table {
      width: 100%; border-collapse: collapse;
      font-size: 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }
    .diff-table th {
      background: var(--surface2); padding: 6px 12px;
      text-align: left; color: var(--text3); font-weight: 600;
    }
    .diff-table td { padding: 5px 12px; border-top: 1px solid var(--border); }
    .diff-table .val-a { color: var(--primary); font-family: var(--mono); text-align: right; }
    .diff-table .val-b { color: var(--accent); font-family: var(--mono); text-align: right; }
    .diff-table .val-diff { font-family: var(--mono); text-align: right; }
    .diff-positive { color: #60d080; }
    .diff-negative { color: #e06060; }
    .diff-zero { color: var(--text3); }

    /* ─── Charts ─────────────────────────────────────── */
    .charts-section { padding: 8px 20px; }
    .chart-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 10px;
    }
    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
    }
    .chart-container h4 {
      font-size: 11px; color: var(--text3);
      margin-bottom: 4px; text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .chart-container.side-a h4 span.side-label { color: var(--primary); }
    .chart-container.side-b h4 span.side-label { color: var(--accent); }
    canvas { width: 100%; border-radius: 3px; display: block; }

    /* ─── Params ─────────────────────────────────────── */
    .params-section {
      padding: 12px 20px;
      font-size: 11px; color: var(--text3);
    }
    .params-section details {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
    }
    .params-section summary { cursor: pointer; color: var(--text2); }
    .params-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 4px 16px; margin-top: 8px;
    }
    .params-grid span { font-family: var(--mono); }

    /* ─── Legend ──────────────────────────────────────── */
    .legend {
      display: flex; gap: 16px; align-items: center;
      padding: 8px 20px; font-size: 11px; color: var(--text3);
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-swatch {
      width: 24px; height: 3px; border-radius: 2px;
    }
    .legend-zone {
      width: 24px; height: 12px; border-radius: 2px;
      border: 1px dashed var(--chunk-border);
      background: var(--chunk-zone);
    }
  </style>
</head>

<body>
  <div id="header">
    <div id="logo"><span class="q">Quota</span><span class="c">Climat</span> — Chunk Comparator</div>
    <div id="header-info"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-zone"></div> Zone du chunk (hors padding)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--primary)"></div> Chunk A</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--accent)"></div> Chunk B</div>
  </div>

  <div class="meta-section" id="meta-section"></div>
  <div class="diff-section" id="diff-section"></div>
  <div class="charts-section" id="charts-section"></div>
  <div class="params-section" id="params-section"></div>

  <script id="embedded-data" type="application/json">null</script>

  <script>
    "use strict";

    const DATA = JSON.parse(document.getElementById("embedded-data").textContent);
    const A = DATA.chunkA;
    const B = DATA.chunkB;
    const PARAMS = DATA.params;
    const PADDING = DATA.paddingSec;

    // ── Utilities ──────────────────────────────────────
    function epochToStr(epoch) {
      const d = new Date(epoch * 1000);
      return d.toISOString().replace("T", " ").replace("Z", "") + " UTC";
    }
    function fmt(v, decimals = 4) {
      if (v === null || v === undefined) return "—";
      return Number(v).toFixed(decimals);
    }
    function relDiff(a, b) {
      const denom = Math.max(Math.abs(a), Math.abs(b), 1e-8);
      return (a - b) / denom;
    }

    // ── Header info ────────────────────────────────────
    document.getElementById("header-info").textContent =
      `Padding: ±${PADDING}s | SR: ${PARAMS.sr} Hz | Hop: ${PARAMS.hop_length}`;

    // ── Metadata cards ─────────────────────────────────
    function buildMetaCard(chunk, side) {
      const cls = side === "b" ? "meta-card side-b" : "meta-card";
      const label = side === "a" ? "Chunk A" : "Chunk B";
      const m = chunk.metadata;
      const w = chunk.window;
      return `<div class="${cls}">
        <h3>${label} — ${chunk.channel}</h3>
        <table class="meta-table">
          <tr><td>Epoch start</td><td>${fmt(chunk.absStart, 2)}</td></tr>
          <tr><td>Epoch end</td><td>${fmt(chunk.absEnd, 2)}</td></tr>
          <tr><td>Date start</td><td style="font-size:11px">${epochToStr(chunk.absStart)}</td></tr>
          <tr><td>Duration</td><td>${fmt(chunk.duration, 3)} s</td></tr>
          <tr><td>Energy (RMS)</td><td>${fmt(m.energy_mean, 6)}</td></tr>
          <tr><td>Spectral Centroid</td><td>${fmt(m.spectral_centroid, 2)} Hz</td></tr>
          <tr><td>ZCR</td><td>${fmt(m.zcr_mean, 6)}</td></tr>
          <tr><td>Constellation peaks</td><td>${m.n_peaks}</td></tr>
          <tr><td>Fingerprint hashes</td><td>${m.n_hashes}</td></tr>
          <tr><td>Window analysée</td><td>${fmt(w.windowDuration, 2)} s</td></tr>
        </table>
      </div>`;
    }
    document.getElementById("meta-section").innerHTML =
      buildMetaCard(A, "a") + buildMetaCard(B, "b");

    // ── Diff table ─────────────────────────────────────
    function diffCell(va, vb, decimals = 4, invert = false) {
      const diff = va - vb;
      const rel = relDiff(va, vb);
      const pct = (rel * 100).toFixed(1);
      let cls = "diff-zero";
      if (Math.abs(rel) > 0.001) cls = diff > 0 ? "diff-positive" : "diff-negative";
      if (invert && cls !== "diff-zero") cls = cls === "diff-positive" ? "diff-negative" : "diff-positive";
      return `<td class="val-diff ${cls}">${diff >= 0 ? "+" : ""}${fmt(diff, decimals)} (${pct}%)</td>`;
    }
    function buildDiffTable() {
      const ma = A.metadata, mb = B.metadata;
      const rows = [
        ["Duration (s)", A.duration, B.duration, 3],
        ["Energy (RMS)", ma.energy_mean, mb.energy_mean, 6],
        ["Spectral Centroid (Hz)", ma.spectral_centroid, mb.spectral_centroid, 2],
        ["ZCR", ma.zcr_mean, mb.zcr_mean, 6],
        ["Constellation peaks", ma.n_peaks, mb.n_peaks, 0],
        ["Fingerprint hashes", ma.n_hashes, mb.n_hashes, 0],
      ];
      let html = `<table class="diff-table">
        <tr><th>Métrique</th><th style="text-align:right">Chunk A</th>
            <th style="text-align:right">Chunk B</th><th style="text-align:right">Δ (A−B)</th></tr>`;
      for (const [name, va, vb, dec] of rows) {
        html += `<tr><td>${name}</td>
          <td class="val-a">${fmt(va, dec)}</td>
          <td class="val-b">${fmt(vb, dec)}</td>
          ${diffCell(va, vb, dec)}</tr>`;
      }
      html += "</table>";
      return html;
    }
    document.getElementById("diff-section").innerHTML = buildDiffTable();

    // ── Chart drawing ──────────────────────────────────
    const CHART_H = 120;
    const SPEC_H = 160;
    const COLORS = { a: "#00d2a0", b: "#f0c040" };
    const BG = "#12122a";

    function createCanvas(w, h) {
      const c = document.createElement("canvas");
      const dpr = window.devicePixelRatio || 1;
      c.width = w * dpr;
      c.height = h * dpr;
      c.style.width = w + "px";
      c.style.height = h + "px";
      const ctx = c.getContext("2d");
      ctx.scale(dpr, dpr);
      return { canvas: c, ctx, w, h };
    }

    function drawChunkZone(ctx, chunk, w, h) {
      const win = chunk.window;
      const dur = win.windowDuration;
      if (dur <= 0) return;
      const x0 = (win.chunkRelStart / dur) * w;
      const x1 = (win.chunkRelEnd / dur) * w;

      ctx.fillStyle = "rgba(0,210,160,0.08)";
      ctx.fillRect(x0, 0, x1 - x0, h);

      ctx.strokeStyle = "rgba(0,210,160,0.5)";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(x0, 0); ctx.lineTo(x0, h);
      ctx.moveTo(x1, 0); ctx.lineTo(x1, h);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawTimeCurve(ctx, data, times, w, h, color, yMin, yMax) {
      if (!data || data.length === 0) return;
      const range = yMax - yMin || 1;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      const tMax = times[times.length - 1] || 1;
      for (let i = 0; i < data.length; i++) {
        const x = (times[i] / tMax) * w;
        const y = h - ((data[i] - yMin) / range) * (h - 4) - 2;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    function drawFilledCurve(ctx, data, times, w, h, color, alpha) {
      if (!data || data.length === 0) return;
      const yMax = Math.max(...data) || 1;
      const tMax = times[times.length - 1] || 1;
      ctx.fillStyle = color.replace(")", `,${alpha})`).replace("rgb", "rgba");
      ctx.beginPath();
      ctx.moveTo(0, h);
      for (let i = 0; i < data.length; i++) {
        const x = (times[i] / tMax) * w;
        const y = h - (data[i] / yMax) * (h - 4) - 2;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fill();
    }

    function drawWaveform(ctx, data, w, h, color, chunk) {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, w, h);
      drawChunkZone(ctx, chunk, w, h);

      const absMax = Math.max(...data.map(Math.abs)) || 1;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const x = (i / data.length) * w;
        const y = h / 2 - (data[i] / absMax) * (h / 2 - 2);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function drawLinePlot(ctx, data, times, w, h, color, chunk, label) {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, w, h);
      drawChunkZone(ctx, chunk, w, h);

      const yMin = Math.min(...data);
      const yMax = Math.max(...data);
      drawTimeCurve(ctx, data, times, w, h, color, yMin, yMax);

      // Y-axis labels
      ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.font = "9px monospace";
      ctx.fillText(fmt(yMax, 3), 2, 10);
      ctx.fillText(fmt(yMin, 3), 2, h - 2);
    }

    function drawSilenceMask(ctx, data, times, w, h, color, chunk) {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, w, h);
      drawChunkZone(ctx, chunk, w, h);

      const tMax = times[times.length - 1] || 1;
      ctx.fillStyle = color.includes("d2a0") ? "rgba(0,210,160,0.3)" : "rgba(240,192,64,0.3)";
      for (let i = 0; i < data.length; i++) {
        if (data[i] > 0.5) {
          const x = (times[i] / tMax) * w;
          const xw = Math.max(1, w / data.length);
          ctx.fillRect(x, 0, xw, h);
        }
      }

      ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.font = "9px monospace";
      ctx.fillText("silent", 2, 10);
    }

    function drawSpectrogram(ctx, spec, w, h, color, chunk, peaks) {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, w, h);

      const { data, nFreq, nTime } = spec;
      const cellW = w / nTime;
      const cellH = h / nFreq;

      // Colormap: dark → colored
      const isA = color.includes("d2a0");
      for (let f = 0; f < nFreq; f++) {
        for (let t = 0; t < nTime; t++) {
          const v = data[f * nTime + t];
          if (v < 0.05) continue;
          const intensity = Math.pow(v, 0.6);
          if (isA) {
            ctx.fillStyle = `rgba(0,${Math.round(210 * intensity)},${Math.round(160 * intensity)},${0.3 + intensity * 0.7})`;
          } else {
            ctx.fillStyle = `rgba(${Math.round(240 * intensity)},${Math.round(192 * intensity)},${Math.round(64 * intensity)},${0.3 + intensity * 0.7})`;
          }
          // Flip Y axis: low freq at bottom
          ctx.fillRect(t * cellW, (nFreq - 1 - f) * cellH, Math.ceil(cellW), Math.ceil(cellH));
        }
      }

      // Draw chunk zone borders
      drawChunkZone(ctx, chunk, w, h);

      // Draw constellation peaks
      if (peaks && peaks.length > 0) {
        ctx.fillStyle = "#ffffff";
        for (const [tIdx, fIdx] of peaks) {
          const x = (tIdx / nTime) * w;
          // Downsample freq index if needed
          const fRatio = fIdx / (1025); // Original n_fft/2+1
          const y = (1 - fRatio) * h;
          ctx.beginPath();
          ctx.arc(x, y, 2.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // ── Build all chart rows ───────────────────────────
    const chartsEl = document.getElementById("charts-section");

    function addChartRow(title, drawFn) {
      const row = document.createElement("div");
      row.className = "chart-row";

      for (const [chunk, side, color] of [[A, "a", COLORS.a], [B, "b", COLORS.b]]) {
        const container = document.createElement("div");
        container.className = `chart-container side-${side}`;
        container.innerHTML = `<h4><span class="side-label">${side === "a" ? "A" : "B"}</span> — ${title}</h4>`;

        const cw = 560;
        const ch = title.includes("Spectrogramme") ? SPEC_H : CHART_H;
        const { canvas, ctx, w, h } = createCanvas(cw, ch);
        drawFn(ctx, chunk, w, h, color);
        container.appendChild(canvas);
        row.appendChild(container);
      }

      chartsEl.appendChild(row);
    }

    // 1. Waveform
    addChartRow("Forme d'onde", (ctx, chunk, w, h, color) => {
      drawWaveform(ctx, chunk.waveform, w, h, color, chunk);
    });

    // 2. Spectrogram + constellation
    addChartRow("Spectrogramme + Constellation", (ctx, chunk, w, h, color) => {
      drawSpectrogram(ctx, chunk.spectrogram, w, h, color, chunk, chunk.constellationPeaks);
    });

    // 3. Energy (RMS)
    addChartRow("Énergie (RMS)", (ctx, chunk, w, h, color) => {
      drawLinePlot(ctx, chunk.energy, chunk.frameTimes, w, h, color, chunk, "RMS");
    });

    // 4. Spectral Centroid
    addChartRow("Centroïde Spectral (Hz)", (ctx, chunk, w, h, color) => {
      drawLinePlot(ctx, chunk.centroid, chunk.frameTimes, w, h, color, chunk, "Centroid");
    });

    // 5. ZCR
    addChartRow("Zero-Crossing Rate", (ctx, chunk, w, h, color) => {
      drawLinePlot(ctx, chunk.zcr, chunk.frameTimes, w, h, color, chunk, "ZCR");
    });

    // 6. Silence mask
    addChartRow("Masque de Silence", (ctx, chunk, w, h, color) => {
      drawSilenceMask(ctx, chunk.silenceMask, chunk.frameTimes, w, h, color, chunk);
    });

    // 7. Cosine dissimilarity
    addChartRow("Dissimilarité Cosinus", (ctx, chunk, w, h, color) => {
      drawLinePlot(ctx, chunk.cosineDissim, chunk.frameTimes, w, h, color, chunk, "CosDissim");
    });

    // 8. Novelty curve (final combined)
    addChartRow("Courbe de Nouveauté (silence × dissimilarité)", (ctx, chunk, w, h, color) => {
      drawLinePlot(ctx, chunk.novelty, chunk.frameTimes, w, h, color, chunk, "Novelty");
    });

    // ── Params section ─────────────────────────────────
    const paramsEl = document.getElementById("params-section");
    let paramsHtml = `<details><summary>Paramètres ChunkCreator</summary><div class="params-grid">`;
    for (const [k, v] of Object.entries(PARAMS)) {
      paramsHtml += `<div>${k}: <span>${v}</span></div>`;
    }
    paramsHtml += `</div></details>`;
    paramsEl.innerHTML = paramsHtml;
  </script>
</body>
</html>
