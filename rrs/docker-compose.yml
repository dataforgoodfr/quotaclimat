services:
  rrs_db:
    image: postgres:15
    ports:
      - 5434:5432
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d rrs_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      TZ: Europe/Paris
      POSTGRES_USER: user
      POSTGRES_DB: rrs_db
      POSTGRES_PASSWORD: password
    logging:
      driver: none

  migrate:
    build:
      context: ../
      dockerfile: rrs/Dockerfile
    entrypoint: ["alembic", "-c", "rrs/alembic.ini", "upgrade", "head"]
    environment:
      RRS_PG_USER: ${RRS_PG_USER:-user}
      RRS_PG_DATABASE: ${RRS_PG_DATABASE:-rrs_db}
      RRS_PG_PASSWORD: ${RRS_PG_PASSWORD:-password}
      RRS_PG_HOST: ${RRS_PG_HOST:-rrs_db}
      RRS_PG_PORT: ${RRS_PG_PORT:-5432}
    depends_on:
      rrs_db:
        condition: service_healthy

  upsert_subjects:
    build:
      context: ../
      dockerfile: rrs/Dockerfile
    entrypoint: ["python", "-m", "rrs.dictionary.upsert_subjects"]
    environment:
      PYTHONPATH: /app
      RRS_PG_USER: ${RRS_PG_USER:-user}
      RRS_PG_DATABASE: ${RRS_PG_DATABASE:-rrs_db}
      RRS_PG_PASSWORD: ${RRS_PG_PASSWORD:-password}
      RRS_PG_HOST: ${RRS_PG_HOST:-rrs_db}
      RRS_PG_PORT: ${RRS_PG_PORT:-5432}
    depends_on:
      migrate:
        condition: service_completed_successfully

  upsert_dictionary:
    build:
      context: ../
      dockerfile: rrs/Dockerfile
    entrypoint: ["python", "-m", "rrs.dictionary.upsert_dictionary"]
    environment:
      PYTHONPATH: /app
      RRS_PG_USER: ${RRS_PG_USER:-user}
      RRS_PG_DATABASE: ${RRS_PG_DATABASE:-rrs_db}
      RRS_PG_PASSWORD: ${RRS_PG_PASSWORD:-password}
      RRS_PG_HOST: ${RRS_PG_HOST:-rrs_db}
      RRS_PG_PORT: ${RRS_PG_PORT:-5432}
    depends_on:
      upsert_subjects:
        condition: service_completed_successfully

  import_segments:
    build:
      context: ../
      dockerfile: rrs/Dockerfile
    entrypoint: ["python", "-m", "rrs.keyword_detection.import_segments"]
    environment:
      PYTHONPATH: /app
      RRS_PG_USER: ${RRS_PG_USER:-user}
      RRS_PG_DATABASE: ${RRS_PG_DATABASE:-rrs_db}
      RRS_PG_PASSWORD: ${RRS_PG_PASSWORD:-password}
      RRS_PG_HOST: ${RRS_PG_HOST:-rrs_db}
      RRS_PG_PORT: ${RRS_PG_PORT:-5432}
      POSTGRES_HOST: ${POSTGRES_HOST:-localhost}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-barometre}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      BUCKET_NAME: ${BUCKET_NAME}
      BUCKET: ${BUCKET}
      BUCKET_SECRET: ${BUCKET_SECRET}
    depends_on:
      rrs_db:
        condition: service_healthy

  import_cases:
    build:
      context: ../
      dockerfile: rrs/Dockerfile
    entrypoint: ["python", "-m", "rrs.keyword_detection.import_cases"]
    environment:
      PYTHONPATH: /app
      RRS_PG_USER: ${RRS_PG_USER:-user}
      RRS_PG_DATABASE: ${RRS_PG_DATABASE:-rrs_db}
      RRS_PG_PASSWORD: ${RRS_PG_PASSWORD:-password}
      RRS_PG_HOST: ${RRS_PG_HOST:-rrs_db}
      RRS_PG_PORT: ${RRS_PG_PORT:-5432}
      POSTGRES_HOST: ${POSTGRES_HOST:-localhost}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-barometre}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    depends_on:
      rrs_db:
        condition: service_healthy

  clustering:
    build:
      context: ../
      dockerfile: rrs/Dockerfile
    entrypoint:
      - sh
      - -c
      - |
        exec python -m rrs.clustering.cluster_llm_v2 \
          ${START_DATE:+--start-date $START_DATE} \
          ${END_DATE:+--end-date $END_DATE} \
          ${PROVIDER:+--provider $PROVIDER} \
          ${TARGET_CLUSTERS:+--target-clusters $TARGET_CLUSTERS} \
          ${EXPIRY_DAYS:+--expiry-days $EXPIRY_DAYS} \
          ${EMBEDDING_BACKEND:+--embedding-backend $EMBEDDING_BACKEND} \
          --output-dir /app/output \
          "$@"
      - --
    environment:
      PYTHONPATH: /app
      RRS_PG_USER: ${RRS_PG_USER:-user}
      RRS_PG_DATABASE: ${RRS_PG_DATABASE:-rrs_db}
      RRS_PG_PASSWORD: ${RRS_PG_PASSWORD:-password}
      RRS_PG_HOST: ${RRS_PG_HOST:-rrs_db}
      RRS_PG_PORT: ${RRS_PG_PORT:-5432}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Clustering parameters — all optional, omit to use defaults
      # START_DATE: "2025-01-01"
      # END_DATE: "2025-01-31"
      # PROVIDER: mistral          # mistral | anthropic
      # TARGET_CLUSTERS: 20
      # EXPIRY_DAYS: 30
      # EMBEDDING_BACKEND: mistral # sentence-transformer | mistral
    volumes:
      - ./clustering_output:/app/output
    depends_on:
      rrs_db:
        condition: service_healthy

  console:
    build:
      context: ../
      dockerfile: rrs/Dockerfile
    entrypoint: ["sleep", "12000"]
    environment:
      PYTHONPATH: /app
      RRS_PG_USER: ${RRS_PG_USER:-user}
      RRS_PG_DATABASE: ${RRS_PG_DATABASE:-rrs_db}
      RRS_PG_PASSWORD: ${RRS_PG_PASSWORD:-password}
      RRS_PG_HOST: ${RRS_PG_HOST:-rrs_db}
      RRS_PG_PORT: ${RRS_PG_PORT:-5432}
    volumes:
      - ../rrs/:/app/rrs/
    tty: true
    depends_on:
      rrs_db:
        condition: service_healthy
